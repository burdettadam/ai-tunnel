services:
  librechat:
    depends_on:
      mcp-github:
        condition: service_started
    environment:
      MCP_GITHUB_PORT: ${MCP_GITHUB_PORT:-8004}
    volumes:
      - ./librechat/librechat.mcp-github.yaml:/app/librechat.yaml:ro

  mcp-github:
    image: ${GITHUB_MCP_IMAGE:-ghcr.io/github/github-mcp-server@sha256:e3816a476a977cfb836e7d221510011436c654d11861db66ecfd826601aba6a4}
    restart: unless-stopped
    env_file:
      - path: ${GITHUB_MCP_ENV_FILE:-../ai-tunnel-secrets/github-mcp.env}
        required: false
    command:
      - --read-only
      - --toolsets
      - ${GITHUB_MCP_TOOLSETS:-repos,issues,pull_requests,users}
      - http
      - --port
      - "${MCP_GITHUB_PORT:-8004}"
    expose:
      - "${MCP_GITHUB_PORT:-8004}"
    networks:
      - internal
