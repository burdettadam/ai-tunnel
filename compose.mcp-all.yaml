services:
  librechat:
    depends_on:
      mcp-github:
        condition: service_started
      mcp-playwright:
        condition: service_started
    environment:
      MCP_GITHUB_PORT: ${MCP_GITHUB_PORT:-8004}
      MCP_PLAYWRIGHT_PORT: ${MCP_PLAYWRIGHT_PORT:-8005}
    volumes:
      - ./librechat/librechat.mcp-all.yaml:/app/librechat.yaml:ro

  mcp-github:
    image: ${GITHUB_MCP_IMAGE:-ghcr.io/github/github-mcp-server@sha256:e3816a476a977cfb836e7d221510011436c654d11861db66ecfd826601aba6a4}
    restart: unless-stopped
    env_file:
      - path: ${GITHUB_MCP_ENV_FILE:-../ai-tunnel-secrets/github-mcp.env}
        required: false
    command:
      - --read-only
      - --toolsets
      - ${GITHUB_MCP_TOOLSETS:-repos,issues,pull_requests,users}
      - http
      - --port
      - "${MCP_GITHUB_PORT:-8004}"
    expose:
      - "${MCP_GITHUB_PORT:-8004}"
    networks:
      - internal

  mcp-playwright:
    image: ${MCP_PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright/mcp@sha256:d238ec7bc98cc4e22df0696d6031dad5b8a4b46781f4f0abaa3bfadeedb43b9a}
    restart: unless-stopped
    entrypoint:
      - node
    command:
      - /app/cli.js
      - --headless
      - --browser
      - chromium
      - --no-sandbox
      - --host
      - 0.0.0.0
      - --port
      - "${MCP_PLAYWRIGHT_PORT:-8005}"
      - --allowed-hosts
      - "*"
      - --isolated
      - --image-responses
      - omit
      - --codegen
      - none
    expose:
      - "${MCP_PLAYWRIGHT_PORT:-8005}"
    networks:
      - internal
