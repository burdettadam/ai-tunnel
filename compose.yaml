services:
  ollama:
    image: ${OLLAMA_IMAGE}
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE}
    volumes:
      - ./${OLLAMA_MODELS_PATH}:/root/.ollama
    expose:
      - "${OLLAMA_PORT}"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  model-router:
    image: python:3.12-alpine
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      MODEL_ROUTER_PORT: ${MODEL_ROUTER_PORT:-11436}
      OLLAMA_PORT: ${OLLAMA_PORT}
      MODEL_ROUTER_TIMEOUT_SECS: ${MODEL_ROUTER_TIMEOUT_SECS:-300}
      MODEL_ROUTER_CACHE_TTL_SECS: ${MODEL_ROUTER_CACHE_TTL_SECS:-30}
      MODEL_ROUTER_CATALOG_FILE: /opt/router/model-catalog.json
      MODEL_ROUTER_PROFILE: ${MODEL_ROUTER_PROFILE:-local-small}
      MODEL_ROUTER_EXTRA_MODELS: ${MODEL_ROUTER_EXTRA_MODELS:-}
      DEEPSEEK_V4_ENABLED: ${DEEPSEEK_V4_ENABLED:-false}
      DEEPSEEK_V4_BASE_URL: ${DEEPSEEK_V4_BASE_URL:-}
      PYTHONUNBUFFERED: "1"
    command:
      - /bin/sh
      - -c
      - |
        exec python /opt/router/model_router.py \
          --bind-host 0.0.0.0 \
          --port "${MODEL_ROUTER_PORT:-11436}" \
          --ollama-base-url "http://ollama:${OLLAMA_PORT}" \
          --timeout "${MODEL_ROUTER_TIMEOUT_SECS:-300}" \
          --model-cache-ttl-secs "${MODEL_ROUTER_CACHE_TTL_SECS:-30}"
    expose:
      - "${MODEL_ROUTER_PORT:-11436}"
    volumes:
      - ./scripts/model_router.py:/opt/router/model_router.py:ro
      - ./models/catalog.json:/opt/router/model-catalog.json:ro
    networks:
      - internal

  ollama-pull:
    image: ${OLLAMA_IMAGE}
    restart: "no"
    profiles:
      - init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:${OLLAMA_PORT}
    command: ["pull", "${OLLAMA_MODEL}"]
    volumes:
      - ./${OLLAMA_MODELS_PATH}:/root/.ollama
    networks:
      - internal

  ollama-pull-local-smoke:
    image: ${OLLAMA_IMAGE}
    restart: "no"
    profiles:
      - init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:${OLLAMA_PORT}
    command: ["pull", "${OLLAMA_LOCAL_SMOKE_MODEL:-qwen2.5:0.5b}"]
    volumes:
      - ./${OLLAMA_MODELS_PATH}:/root/.ollama
    networks:
      - internal

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    depends_on:
      model-router:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      NGINX_LISTEN_PORT: ${NGINX_LISTEN_PORT}
      MODEL_ROUTER_PORT: ${MODEL_ROUTER_PORT:-11436}
      OLLAMA_PORT: ${OLLAMA_PORT}
      OLLAMA_API_HOSTNAME: ${OLLAMA_API_HOSTNAME}
      OLLAMA_ADMIN_HOSTNAME: ${OLLAMA_ADMIN_HOSTNAME}
      ENABLE_ADMIN_BASIC_AUTH: ${ENABLE_ADMIN_BASIC_AUTH}
      ENABLE_RAW_OLLAMA_API: ${ENABLE_RAW_OLLAMA_API}
      ENABLE_OPENAI_COMPAT_API: ${ENABLE_OPENAI_COMPAT_API}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT}
      NGINX_RATE_LIMIT_RPS: ${NGINX_RATE_LIMIT_RPS}
      NGINX_RATE_LIMIT_BURST: ${NGINX_RATE_LIMIT_BURST}
      NGINX_API_TOKEN_FILE: /run/secrets/ollama-api-token
      NGINX_BASIC_AUTH_FILE: /run/secrets/nginx-htpasswd
    command: ["/bin/sh", "/usr/local/bin/render-config.sh"]
    ports:
      - "127.0.0.1:${NGINX_LISTEN_PORT}:${NGINX_LISTEN_PORT}"
    volumes:
      - ./nginx/nginx.conf:/opt/nginx/nginx.conf.template:ro
      - ./nginx/conf.d/ollama.conf.template:/opt/nginx/ollama.conf.template:ro
      - ./nginx/entrypoint/render-config.sh:/usr/local/bin/render-config.sh:ro
      - ${NGINX_API_TOKEN_FILE}:/run/secrets/ollama-api-token:ro
      - ${NGINX_BASIC_AUTH_FILE}:/run/secrets/nginx-htpasswd:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - --header='Host: ${OLLAMA_API_HOSTNAME}' http://127.0.0.1:${NGINX_LISTEN_PORT}/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      nginx:
        condition: service_healthy
    command:
      - tunnel
      - --metrics
      - 0.0.0.0:${CLOUDFLARED_METRICS_PORT}
      - run
      - --token-file
      - /run/secrets/cloudflared-token
    ports:
      - "127.0.0.1:${CLOUDFLARED_METRICS_PORT}:${CLOUDFLARED_METRICS_PORT}"
    volumes:
      - ${CF_TUNNEL_TOKEN_FILE}:/run/secrets/cloudflared-token:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge
